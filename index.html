<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬시코기 상벌점 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --accent: #f5a623;
    --accent2: #e8572a;
    --text: #f0ece4;
    --text2: #999;
    --positive: #4ade80;
    --negative: #f87171;
    --border: #2e2e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 2px solid var(--accent);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header img {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid var(--accent);
  }

  .header-title {
    display: flex;
    flex-direction: column;
  }

  .header-title h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .header-title span {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SEARCH */
  .search-section {
    margin-bottom: 32px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px 14px 48px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
  }

  .search-wrap input::placeholder { color: var(--text2); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
  }

  /* SEARCH RESULT */
  .search-result {
    display: none;
    margin-top: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .search-result.show { display: block; }

  .result-header {
    background: var(--bg2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .result-name {
    font-weight: 700;
    font-size: 17px;
  }

  .result-rank {
    margin-left: auto;
    font-size: 12px;
    color: var(--text2);
  }

  .result-rank span {
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
  }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .stat-box {
    background: var(--bg3);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-value {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
  }

  .stat-value.positive { color: var(--positive); }
  .stat-value.negative { color: var(--negative); }
  .stat-value.neutral { color: var(--accent); }

  .no-result {
    padding: 24px 20px;
    color: var(--text2);
    text-align: center;
    font-size: 14px;
  }

  /* CHART */
  .chart-section {
    margin-bottom: 32px;
  }

  .chart-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    height: 360px;
    position: relative;
  }

  /* TABLE */
  .table-section { margin-bottom: 32px; }

  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 400px;
  }

  thead th {
    background: var(--bg3);
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--text2);
    text-align: left;
    font-weight: 700;
    text-transform: uppercase;
  }

  thead th.num { text-align: center; width: 48px; }
  thead th.score-col { text-align: right; }

  tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--bg3); }

  tbody td {
    padding: 11px 16px;
    font-size: 14px;
  }

  td.rank-cell {
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    color: var(--text2);
    width: 48px;
  }

  td.rank-cell.top1 { color: #FFD700; }
  td.rank-cell.top2 { color: #C0C0C0; }
  td.rank-cell.top3 { color: #CD7F32; }

  td.name-cell { font-weight: 500; }

  td.score-cell {
    text-align: right;
    font-weight: 700;
    font-size: 15px;
  }

  td.score-cell.pos { color: var(--positive); }
  td.score-cell.neg { color: var(--negative); }
  td.score-cell.zero { color: var(--text2); }

  td.total-cell {
    text-align: right;
    font-weight: 700;
    font-size: 15px;
  }

  td.total-cell.pos { color: var(--positive); }
  td.total-cell.neg { color: var(--negative); }

  /* FOOTER */
  footer {
    text-align: center;
    color: var(--text2);
    font-size: 12px;
    padding: 20px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .header-title h1 { font-size: 18px; }
    main { padding: 20px 14px 50px; }
    .chart-wrap { height: 320px; }
    .stat-value { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <img src="https://i.imgur.com/placeholder.png" id="logoImg" alt="헬시코기" onerror="this.style.display='none'">
  <div class="header-title">
    <h1>🐕 헬시코기</h1>
    <span>2026 상벌점 현황</span>
  </div>
  <div class="header-badge" id="memberCount">— 명</div>
</header>

<main>

  <!-- 검색 -->
  <section class="search-section">
    <div class="section-title">🔍 내 점수 검색</div>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input type="text" id="searchInput" placeholder="이름을 입력하세요 (예: 김용진)" autocomplete="off">
    </div>
    <div class="search-result" id="searchResult">
      <div class="result-header">
        <span class="result-name" id="resultName"></span>
        <span class="result-rank">1분기 순위 <span id="resultRank"></span>위</span>
      </div>
      <div class="result-stats">
        <div class="stat-box">
          <div class="stat-label">1분기 상점</div>
          <div class="stat-value neutral" id="resultQ1"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">상벌점 합계</div>
          <div class="stat-value" id="resultTotal"></div>
        </div>
      </div>
    </div>
    <div id="noResult" style="display:none; color:var(--text2); font-size:14px; margin-top:12px; padding:12px 0;">검색 결과가 없습니다.</div>
  </section>

  <!-- 차트 -->
  <section class="chart-section">
    <div class="section-title">🏆 1분기 상점 순위</div>
    <div class="chart-wrap">
      <canvas id="rankChart"></canvas>
    </div>
  </section>

  <!-- 전체 테이블 -->
  <section class="table-section">
    <div class="section-title">📋 전체 멤버 현황</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num">순위</th>
            <th>이름</th>
            <th class="score-col">1분기 상점</th>
            <th class="score-col">상벌점 합계 (-4점 시 제명😥)</th>
          </tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
    </div>
  </section>

</main>

<footer>
  헬시코기 운동 모임 · 데이터 기준: 2025년 1분기
</footer>

let raw = [];
let chartInstance = null;

async function loadData() {
  try {
    const res = await fetch(SHEET_CSV);
    const text = await res.text();
    parseCSV(text);
    renderAll();
  } catch(e) {
    document.getElementById('memberTable').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text2)">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>';
  }
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.split(','));
  raw = [];
  // 헤더 찾기: 연번, 벌점누적, 상점누적, 상벌점합계, 1분기상점, 이름
  // 시트 컬럼: 0=연번, 1=벌점누적, 2=상점누적, 3=상벌점합계, 4=1분기상점, 5=이름
  for (let i = 2; i < lines.length; i++) {
    const row = lines[i];
    if (!row[5] || !row[5].trim()) continue;
    const name = row[5].replace(/"/g, '').trim();
    if (!name || name === '이름') continue;
    const q1 = parseInt(row[4]) || 0;
    const total = parseInt(row[3]) || 0;
    raw.push({ name, q1, total });
  }
  document.getElementById('memberCount').textContent = raw.length + '명';
}

function renderAll() {
  const sorted = [...raw].sort((a, b) => b.q1 - a.q1);
  let rankMap = {};
  sorted.forEach((m, i) => {
    if (i === 0 || sorted[i-1].q1 !== m.q1) rankMap[m.name] = i + 1;
    else rankMap[m.name] = rankMap[sorted[i-1].name];
  });

  // 검색
  const searchInput = document.getElementById('searchInput');
  const searchResult = document.getElementById('searchResult');
  const noResult = document.getElementById('noResult');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    if (!q) { searchResult.classList.remove('show'); noResult.style.display='none'; return; }
    const found = raw.filter(m => m.name.includes(q));
    if (found.length === 0) {
      searchResult.classList.remove('show');
      noResult.style.display = 'block';
      return;
    }
    noResult.style.display = 'none';
    const m = found[0];
    document.getElementById('resultName').textContent = m.name;
    document.getElementById('resultRank').textContent = rankMap[m.name];
    document.getElementById('resultQ1').textContent = (m.q1 >= 0 ? '+' : '') + m.q1;
    const totalEl = document.getElementById('resultTotal');
    totalEl.textContent = (m.total >= 0 ? '+' : '') + m.total;
    totalEl.className = 'stat-value ' + (m.total > 0 ? 'positive' : m.total < 0 ? 'negative' : 'neutral');
    searchResult.classList.add('show');
  });

  // 차트
  const isMobile = window.innerWidth < 600;
  const chartCount = isMobile ? 10 : 20;
  const chartData = sorted.slice(0, chartCount);

  // 모바일: 막대 위에 점수 숫자 표시 플러그인
  const topLabelPlugin = {
    id: 'topLabels',
    afterDatasetsDraw(chart) {
      const c = chart.ctx;
      c.save();
      c.font = 'bold 9px sans-serif';
      c.fillStyle = '#f0ece4';
      c.textAlign = 'center';
      chart.data.datasets[0].data.forEach((val, i) => {
        const bar = chart.getDatasetMeta(0).data[i];
        c.fillText(val, bar.x, bar.y - 4);
      });
      c.restore();
    }
  };

  const ctx = document.getElementById('rankChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    plugins: isMobile ? [topLabelPlugin] : [],
    data: {
      labels: chartData.map(m => m.name),
      datasets: [{
        label: '1분기 상점',
        data: chartData.map(m => m.q1),
        backgroundColor: chartData.map((m, i) => {
          if (i === 0) return '#FFD700';
          if (i === 1) return '#C0C0C0';
          if (i === 2) return '#CD7F32';
          return '#f5a623aa';
        }),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `상점: ${ctx.parsed.y}점` } }
      },
      scales: {
        x: {
          ticks: {
            display: !isMobile,
            color: '#999',
            font: { size: 10, family: 'Noto Sans KR' },
            maxRotation: 45
          },
          grid: { color: '#2e2e2e' }
        },
        y: { ticks: { color: '#999', font: { size: 11 } }, grid: { color: '#2e2e2e' }, beginAtZero: true }
      }
    }
  });

  // 테이블
  const tbody = document.getElementById('memberTable');
  tbody.innerHTML = '';
  sorted.forEach(m => {
    const rank = rankMap[m.name];
    const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
    const q1Class = m.q1 > 0 ? 'pos' : m.q1 < 0 ? 'neg' : 'zero';
    const totalClass = m.total > 0 ? 'pos' : m.total < 0 ? 'neg' : 'zero';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank-cell ${rankClass}">${rank}</td>
      <td class="name-cell">${m.name}</td>
      <td class="score-cell ${q1Class}">${m.q1 >= 0 ? '+' : ''}${m.q1}</td>
      <td class="total-cell ${totalClass}">${m.total >= 0 ? '+' : ''}${m.total}</td>
    `;
    tbody.appendChild(tr);
  });
}

loadData();
</script>
